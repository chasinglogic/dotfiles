mappings:
  - match: AGENTS.md
    skip: true
  - match: .config/nvim/snippets
    link_as_dir: true
  - match: .*gpg-agent.conf.darwin
    dest: ~/.gnupg/gpg-agent.conf
    target_os: Darwin
  - match: .config/ghostty/macos-config
    skip: true
    target_os: Linux
  - match: .gemini/policies/.*
    link_as_dir: true
  - match: .agents/$
    link_as_dir: true
  - match: .config/opencode/agents/$
    link_as_dir: true

modules:
  - repository: git@github.com:chasinglogic/secrets.git

llm:
  model_provider: gemini-cli
  # commit_messages: true
